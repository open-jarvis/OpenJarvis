# Local MLX Scheduled Monitor — persistent memory-backed monitoring

[engine]
default = "mlx"

[engine.mlx]
host = "http://127.0.0.1:11435"

[intelligence]
default_model = "mlx-community/Qwen3.5-9B-MLX-4bit"
temperature = 0.2
max_tokens = 3072

[agent]
default_agent = "operative"
max_turns = 20
context_from_memory = true

[tools]
enabled = ["web_search", "file_read", "file_write", "shell_exec", "memory_store", "memory_search", "memory_retrieve", "retrieval", "think"]

[tools.storage]
default_backend = "sqlite"

[traces]
enabled = true
