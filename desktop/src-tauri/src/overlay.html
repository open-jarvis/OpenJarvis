<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{
  background:transparent;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue",sans-serif;
  color:#fff;
  height:100%;
  overflow:hidden;
}
#container{
  display:flex;flex-direction:column;justify-content:flex-end;
  height:100%;padding:12px;
}
#response{
  display:none;
  margin-bottom:8px;padding:16px;
  border-radius:16px;
  background:rgba(30,30,30,0.88);
  -webkit-backdrop-filter:blur(50px);
  backdrop-filter:blur(50px);
  border:1px solid rgba(255,255,255,0.06);
  font-size:13px;line-height:1.6;
  color:rgba(255,255,255,0.88);
  max-height:280px;overflow-y:auto;
  white-space:pre-wrap;word-wrap:break-word;
  -webkit-user-select:text;user-select:text;
}
#response.visible{display:block}
#input-bar{
  display:flex;align-items:center;gap:8px;
  border-radius:16px;padding:8px 8px 8px 4px;
  background:rgba(30,30,30,0.88);
  -webkit-backdrop-filter:blur(50px);
  backdrop-filter:blur(50px);
  border:1px solid rgba(255,255,255,0.08);
  box-shadow:0 25px 50px -12px rgba(0,0,0,0.5);
}
#input{
  flex:1;background:transparent;border:none;outline:none;
  color:#fff;font-size:14px;padding:6px 12px;
}
#input::placeholder{color:rgba(255,255,255,0.35)}
.btn{
  display:flex;align-items:center;justify-content:center;
  width:32px;height:32px;border-radius:50%;border:none;
  background:rgba(255,255,255,0.15);color:#fff;cursor:pointer;
  transition:background .15s;flex-shrink:0;
}
.btn:hover{background:rgba(255,255,255,0.25)}
.btn:disabled{opacity:0.3;cursor:default}
.btn:disabled:hover{background:rgba(255,255,255,0.15)}
#response::-webkit-scrollbar{width:6px}
#response::-webkit-scrollbar-track{background:transparent}
#response::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:3px}
</style>
</head>
<body>
<div id="container">
  <div id="response"></div>
  <div id="input-bar">
    <input id="input" type="text" placeholder="Ask Jarvis anything..." autofocus>
    <button id="send-btn" class="btn" disabled title="Send">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="19" x2="12" y2="5"/>
        <polyline points="5 12 12 5 19 12"/>
      </svg>
    </button>
  </div>
</div>
<script>
const input=document.getElementById('input');
const sendBtn=document.getElementById('send-btn');
const responseEl=document.getElementById('response');
let streaming=false,abort=null,model='qwen3.5:4b';

// Try to pick the best available model
fetch('/v1/models').then(r=>r.json()).then(d=>{
  const list=Array.isArray(d)?d:(d.data||d.models||[]);
  if(list.length)model=list[0].id||list[0].name||model;
}).catch(()=>{});

const SEND_ICON='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>';
const STOP_ICON='<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>';

input.addEventListener('input',()=>{sendBtn.disabled=!input.value.trim()||streaming});

input.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}
  if(e.key==='Escape'){
    if(streaming){abort&&abort.abort()}
    else{try{window.webkit.messageHandlers.overlay.postMessage('hide')}catch(x){}}
  }
});

sendBtn.addEventListener('click',()=>{
  if(streaming){abort&&abort.abort()}else{send()}
});

async function send(){
  const text=input.value.trim();
  if(!text||streaming)return;
  input.value='';sendBtn.disabled=true;
  responseEl.textContent='';responseEl.classList.add('visible');
  streaming=true;abort=new AbortController();
  sendBtn.innerHTML=STOP_ICON;sendBtn.disabled=false;

  try{
    const r=await fetch('/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model,messages:[{role:'user',content:text}],stream:true}),
      signal:abort.signal
    });
    if(!r.ok)throw new Error(r.status);
    const reader=r.body.getReader(),dec=new TextDecoder();
    let buf='',acc='';
    for(;;){
      const{done,value}=await reader.read();
      if(done)break;
      buf+=dec.decode(value,{stream:true});
      const lines=buf.split('\n');buf=lines.pop()||'';
      for(const ln of lines){
        if(!ln.startsWith('data: '))continue;
        const d=ln.slice(6);if(d==='[DONE]')break;
        try{
          const c=JSON.parse(d).choices?.[0]?.delta?.content;
          if(c){acc+=c;responseEl.textContent=acc;responseEl.scrollTop=responseEl.scrollHeight}
        }catch(x){}
      }
    }
  }catch(e){
    if(e.name!=='AbortError')responseEl.textContent='Could not get a response. Is the backend running?';
  }finally{
    streaming=false;abort=null;
    sendBtn.innerHTML=SEND_ICON;
    sendBtn.disabled=!input.value.trim();
    input.focus();
  }
}

window.addEventListener('focus',()=>input.focus());
</script>
</body>
</html>
