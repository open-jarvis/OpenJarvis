# M2 Test 1: 27B-GAIA with ONLY max_turns=15 (keep temp=0.6, keep tools)
# Isolates whether temp=0.2 was the culprit
[meta]
name = "gaia-qwen-27b-maxturns-only"
description = "Test 1: max_turns=15 only, temp unchanged"

[defaults]
temperature = 0.6
max_tokens = 8192

[judge]
model = "gpt-5-mini-2025-08-07"
temperature = 0.0
engine = "cloud"
max_tokens = 4096

[run]
max_workers = 1
output_dir = "results/neurips-2026/distillation-m2/test1/qwen-27b/gaia/"
seed = 42

[[models]]
name = "Qwen/Qwen3.5-27B-FP8"
engine = "vllm"
num_gpus = 1

[[benchmarks]]
name = "gaia"
backend = "jarvis-agent"
agent = "monitor_operative"
max_samples = 50
tools = ["think", "calculator", "code_interpreter", "web_search", "file_read"]
