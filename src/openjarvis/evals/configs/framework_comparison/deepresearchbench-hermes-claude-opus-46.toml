# Jinja-style template for framework-comparison configs.
# Substitution variables (all required):
#   deepresearchbench      e.g. "gaia"
#   hermes      one of: openjarvis, hermes, openclaw, openjarvis-distilled
#   hermes   backend id: jarvis-agent | hermes | openclaw
#   Claude Opus 4.6   e.g. "Qwen3.5-9B"
#   claude-opus-4-6       e.g. "Qwen/Qwen3.5-9B"
#   claude-opus-46     filename-safe slug, e.g. "qwen-9b"
#   cloud         e.g. "vllm" | "cloud"
#   0       int, default 1
#   ["think", "web_search"]          TOML list literal
#   80    int
#   0.6    float
#   8192     int
#   gpt-5-mini-2025-08-07    LLM judge id

[meta]
name = "deepresearchbench-hermes-claude-opus-46"
description = "deepresearchbench on hermes + Claude Opus 4.6"
framework = "hermes"
framework_id = "hermes"

[defaults]
temperature = 0.6
max_tokens = 8192

[judge]
model = "gpt-5-mini-2025-08-07"
temperature = 0.0
max_tokens = 4096
engine = "cloud"

[run]
max_workers = 1
output_dir = "results/neurips-2026/comparison/hermes/claude-opus-46/deepresearchbench/"
seed = 42

[[models]]
name = "claude-opus-4-6"
engine = "cloud"
num_gpus = 0

[[benchmarks]]
name = "deepresearchbench"
backend = "hermes"
max_samples = 80
tools = ["think", "web_search"]
