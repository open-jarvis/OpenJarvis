# Jinja-style template for framework-comparison configs.
# Substitution variables (all required):
#   gaia      e.g. "gaia"
#   openclaw      one of: openjarvis, hermes, openclaw, openjarvis-distilled
#   openclaw   backend id: jarvis-agent | hermes | openclaw
#   Qwen3.5-122B   e.g. "Qwen3.5-9B"
#   Qwen/Qwen3.5-122B       e.g. "Qwen/Qwen3.5-9B"
#   qwen-122b     filename-safe slug, e.g. "qwen-9b"
#   vllm         e.g. "vllm" | "cloud"
#   4       int, default 1
#   ["think", "calculator", "code_interpreter", "web_search", "file_read"]          TOML list literal
#   50    int
#   0.6    float
#   8192     int
#   gpt-5-mini-2025-08-07    LLM judge id

[meta]
name = "gaia-openclaw-qwen-122b"
description = "gaia on openclaw + Qwen3.5-122B"
framework = "openclaw"
framework_id = "openclaw"

[defaults]
temperature = 0.6
max_tokens = 8192

[judge]
model = "gpt-5-mini-2025-08-07"
temperature = 0.0
max_tokens = 4096
engine = "cloud"

[run]
max_workers = 1
output_dir = "results/neurips-2026/comparison/openclaw/qwen-122b/gaia/"
seed = 42

[[models]]
name = "Qwen/Qwen3.5-122B"
engine = "vllm"
num_gpus = 4

[[benchmarks]]
name = "gaia"
backend = "openclaw"
max_samples = 50
tools = ["think", "calculator", "code_interpreter", "web_search", "file_read"]
