[meta]
name = "pinchbench-openclaw-claude-opus-46"
description = "pinchbench on openclaw + Claude Opus 4.6"
framework = "openclaw"
framework_id = "openclaw"

[defaults]
temperature = 0.6
max_tokens = 8192

[judge]
model = "gpt-5-mini-2025-08-07"
temperature = 0.0
max_tokens = 4096
engine = "cloud"

[run]
max_workers = 1
output_dir = "results/neurips-2026/comparison/openclaw/claude-opus-46/pinchbench/"
seed = 42

[[models]]
name = "claude-opus-4-6"
engine = "cloud"
num_gpus = 0

[[benchmarks]]
name = "pinchbench"
backend = "openclaw"
max_samples = 23
tools = ["think", "code_interpreter", "web_search", "file_read"]
