[meta]
name = "pinchbench-openclaw-qwen-122b"
description = "pinchbench on openclaw + Qwen3.5-122B"
framework = "openclaw"
framework_id = "openclaw"

[defaults]
temperature = 0.6
max_tokens = 8192

[judge]
model = "gpt-5-mini-2025-08-07"
temperature = 0.0
max_tokens = 4096
engine = "cloud"

[run]
max_workers = 1
output_dir = "results/neurips-2026/comparison/openclaw/qwen-122b/pinchbench/"
seed = 42

[[models]]
name = "Qwen/Qwen3.5-122B"
engine = "vllm"
num_gpus = 4

[[benchmarks]]
name = "pinchbench"
backend = "openclaw"
max_samples = 23
tools = ["think", "code_interpreter", "web_search", "file_read"]
