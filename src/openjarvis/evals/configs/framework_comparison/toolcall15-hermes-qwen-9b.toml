[meta]
name = "toolcall15-hermes-qwen-9b"
description = "toolcall15 on hermes + Qwen3.5-9B"
framework = "hermes"
framework_id = "hermes"

[defaults]
temperature = 0.0
max_tokens = 8192

[judge]
model = "gpt-5-mini-2025-08-07"
