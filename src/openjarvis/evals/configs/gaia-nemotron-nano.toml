# GAIA eval: NVIDIA-Nemotron-3-Nano-30B-A3B-FP8 (vLLM, 2 GPUs PP=2)
[meta]
name = "gaia-nemotron-nano"
description = "GAIA on nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-FP8 with monitor_operative agent"

[defaults]
temperature = 0.6
max_tokens = 8192

[judge]
model = "gpt-5-mini-2025-08-07"
temperature = 0.0
max_tokens = 4096
engine = "cloud"

[run]
max_workers = 1
output_dir = "results/neurips-2026/baselines/nemotron-nano/gaia/"
seed = 42

[[models]]
name = "nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-FP8"
engine = "vllm"
num_gpus = 2

[[benchmarks]]
name = "gaia"
backend = "jarvis-agent"
agent = "monitor_operative"
max_samples = 50
tools = ["think", "calculator", "code_interpreter", "web_search", "file_read"]
