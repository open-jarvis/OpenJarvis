# deepresearch evaluation for gemma4-e4b

[meta]
name = "deepresearch-gemma4-e4b-pod"
description = "deepresearch on google/gemma-4-E4B-it (pod evaluation)"

[defaults]
temperature = 0.6
max_tokens = 16384

[judge]
model = "gpt-4.1-mini"
temperature = 0.0
max_tokens = 16384
engine = "cloud"

[run]
trace_detail = true
max_workers = 1
output_dir = "/tmp/results/gemma4-e4b/"
seed = 42
telemetry = true
gpu_metrics = true

[engine.vllm]
host = "http://localhost:8008"

[[models]]
name = "google/gemma-4-E4B-it"
engine = "vllm"
param_count_b = 8.0

[[benchmarks]]
name = "deepresearch"
backend = "jarvis-agent"
agent = "monitor_operative"
tools = ["web_search", "file_read", "file_write", "code_interpreter", "think"]
