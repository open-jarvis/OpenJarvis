# pinchbench evaluation for gemma4-e4b

[meta]
name = "pinchbench-gemma4-e4b-pod"
description = "pinchbench on google/gemma-4-E4B-it (pod evaluation)"

[defaults]
temperature = 0.6
max_tokens = 16384

[judge]
model = "claude-opus-4-5"
temperature = 0.0
engine = "cloud"

[run]
trace_detail = true
max_workers = 1
output_dir = "/tmp/results/gemma4-e4b/"
seed = 42
telemetry = true
gpu_metrics = true

[engine.vllm]
host = "http://localhost:8008"

[[models]]
name = "google/gemma-4-E4B-it"
engine = "vllm"

param_count_b = 8.0
[[benchmarks]]
name = "pinchbench"
backend = "jarvis-agent"
agent = "native_openhands"
tools = [
    "think", "file_read", "file_write", "web_search", "shell_exec",
    "code_interpreter", "browser_navigate", "image_generate",
    "calculator", "http_request", "pdf_extract",
]
