# toolcall15 evaluation for gemma4-e4b

[meta]
name = "toolcall15-gemma4-e4b-pod"
description = "toolcall15 on google/gemma-4-E4B-it (pod evaluation)"

[defaults]
temperature = 0.0
max_tokens = 16384

[judge]
model = "gpt-5-mini-2025-08-07"
temperature = 0.0
engine = "cloud"

[run]
trace_detail = true
max_workers = 1
output_dir = "/tmp/results/gemma4-e4b/"
seed = 42
telemetry = true
gpu_metrics = true

[engine.vllm]
host = "http://localhost:8008"

[[models]]
name = "google/gemma-4-E4B-it"
engine = "vllm"

param_count_b = 8.0
[[benchmarks]]
name = "toolcall15"
backend = "jarvis-direct"
max_turns = 20
