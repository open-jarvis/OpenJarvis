# liveresearchbench evaluation for kimi-k25

[meta]
name = "liveresearchbench-kimi-k25-pod"
description = "liveresearchbench on moonshotai/Kimi-K2.5 (pod evaluation)"

[defaults]
temperature = 0.6
max_tokens = 4096

[judge]
model = "gpt-4.1-mini"
temperature = 0.0
max_tokens = 4096
engine = "cloud"

[run]
trace_detail = true
max_workers = 1
output_dir = "/tmp/results/kimi-k25/"
seed = 42

telemetry = true
gpu_metrics = true
[engine.vllm]
host = "http://localhost:8000"

[[models]]
name = "moonshotai/Kimi-K2.5"
engine = "vllm"

param_count_b = 1000.0
active_params_b = 32.0
[[benchmarks]]
name = "liveresearchbench"
backend = "jarvis-agent"
agent = "monitor_operative"
tools = ["web_search", "file_read", "file_write", "code_interpreter", "think"]
max_turns = 60
