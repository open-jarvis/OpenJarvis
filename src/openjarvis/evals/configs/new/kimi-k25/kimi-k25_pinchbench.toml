# pinchbench evaluation for kimi-k25

[meta]
name = "pinchbench-kimi-k25-pod"
description = "pinchbench on moonshotai/Kimi-K2.5 (pod evaluation)"

[defaults]
temperature = 0.6
max_tokens = 4096

[judge]
model = "claude-opus-4-5"
temperature = 0.0
engine = "cloud"

[run]
trace_detail = true
max_workers = 1
output_dir = "/tmp/results/kimi-k25/"
seed = 42

telemetry = true
gpu_metrics = true
[engine.vllm]
host = "http://localhost:8000"

[[models]]
name = "moonshotai/Kimi-K2.5"
engine = "vllm"

param_count_b = 1000.0
active_params_b = 32.0
[[benchmarks]]
name = "pinchbench"
backend = "jarvis-agent"
agent = "native_openhands"
tools = [
    "think", "file_read", "file_write", "web_search", "shell_exec",
    "code_interpreter", "browser_navigate", "image_generate",
    "calculator", "http_request", "pdf_extract",
]
max_turns = 50
