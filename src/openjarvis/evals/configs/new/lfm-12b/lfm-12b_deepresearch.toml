# deepresearch evaluation for lfm-12b

[meta]
name = "deepresearch-lfm-12b-pod"
description = "deepresearch on LFM-12B (pod evaluation)"

[defaults]
temperature = 0.6
max_tokens = 16384

[judge]
model = "gpt-4.1-mini"
temperature = 0.0
max_tokens = 16384
engine = "cloud"

[run]
trace_detail = true
max_workers = 1
output_dir = "/tmp/results/lfm-12b/"
seed = 42

telemetry = true
gpu_metrics = true
[engine.vllm]
host = "http://localhost:8004"

[[models]]
name = "LiquidAI/LFM2.5-1.2B-Instruct"
engine = "vllm"

param_count_b = 1.2
[[benchmarks]]
name = "deepresearch"
backend = "jarvis-agent"
agent = "monitor_operative"
tools = ["web_search", "file_read", "file_write", "code_interpreter", "think"]
