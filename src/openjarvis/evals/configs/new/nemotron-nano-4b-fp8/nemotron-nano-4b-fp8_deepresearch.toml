# deepresearch evaluation for nemotron-nano

[meta]
name = "deepresearch-nemotron-nano-pod"
description = "deepresearch on Nemotron-Nano-4B-FP8 (pod evaluation)"

[defaults]
temperature = 0.6
max_tokens = 16384

[judge]
model = "gpt-4.1-mini"
temperature = 0.0
max_tokens = 16384
engine = "cloud"

[run]
trace_detail = true
max_workers = 1
output_dir = "/tmp/results/nemotron-nano-4b-fp8/"
seed = 42

telemetry = true
gpu_metrics = true
[engine.vllm]
host = "http://localhost:8007"

[[models]]
name = "nvidia/NVIDIA-Nemotron-3-Nano-4B-FP8"
engine = "vllm"

param_count_b = 4.0
[[benchmarks]]
name = "deepresearch"
backend = "jarvis-agent"
agent = "monitor_operative"
tools = ["web_search", "file_read", "file_write", "code_interpreter", "think"]
max_turns = 60
