# gaia evaluation for nemotron-nano

[meta]
name = "gaia-nemotron-nano-4b-fp8-pod"
description = "gaia on Nemotron-Nano-30B-A3B-BF16 (pod evaluation)"

[defaults]
temperature = 0.6
max_tokens = 16384

[judge]
model = "gpt-5-mini-2025-08-07"
temperature = 0.0
max_tokens = 16384
engine = "cloud"

[run]
trace_detail = true
max_workers = 1
output_dir = "/tmp/results/nemotron-nano-4b-fp8/"
seed = 42

telemetry = true
gpu_metrics = true
[engine.vllm]
host = "http://localhost:8007"

[[models]]
name = "nvidia/NVIDIA-Nemotron-3-Nano-4B-FP8"
engine = "vllm"

param_count_b = 4.0
[[benchmarks]]
name = "gaia"
backend = "jarvis-agent"
agent = "monitor_operative"
tools = ["think", "calculator", "code_interpreter", "web_search", "file_read"]
max_turns = 50
