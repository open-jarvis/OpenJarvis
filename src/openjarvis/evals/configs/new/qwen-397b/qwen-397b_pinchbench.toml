# pinchbench evaluation for qwen-397b

[meta]
name = "pinchbench-qwen-397b-pod"
description = "pinchbench on Qwen/Qwen3.5-397B-A17B-FP8 (pod evaluation)"

[defaults]
temperature = 0.6
max_tokens = 16384

[judge]
model = "claude-opus-4-5"
temperature = 0.0
engine = "cloud"

[run]
trace_detail = true
max_workers = 1
output_dir = "/tmp/results/qwen-397b/"
seed = 42

telemetry = true
gpu_metrics = true
[engine.vllm]
host = "http://localhost:8000"

[[models]]
name = "Qwen/Qwen3.5-397B-A17B-FP8"
engine = "vllm"

param_count_b = 397.0
active_params_b = 17.0
[[benchmarks]]
name = "pinchbench"
backend = "jarvis-agent"
agent = "native_openhands"
tools = [
    "think", "file_read", "file_write", "web_search", "shell_exec",
    "code_interpreter", "browser_navigate", "image_generate",
    "calculator", "http_request", "pdf_extract",
]
