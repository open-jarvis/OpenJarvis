# deepresearch evaluation for qwen-9b

[meta]
name = "deepresearch-qwen-9b-pod"
description = "deepresearch on Qwen/Qwen3.5-9B (pod evaluation)"

[defaults]
temperature = 0.6
max_tokens = 16384

[judge]
model = "gpt-4.1-mini"
temperature = 0.0
max_tokens = 16384
engine = "cloud"

[run]
trace_detail = true
max_workers = 1
output_dir = "/tmp/results/qwen-9b/"
seed = 42

telemetry = true
gpu_metrics = true
[engine.vllm]
host = "http://localhost:8002"

[[models]]
name = "Qwen/Qwen3.5-9B"
engine = "vllm"

param_count_b = 9.0
[[benchmarks]]
name = "deepresearch"
backend = "jarvis-agent"
agent = "monitor_operative"
tools = ["web_search", "file_read", "file_write", "code_interpreter", "think"]
max_turns = 60
