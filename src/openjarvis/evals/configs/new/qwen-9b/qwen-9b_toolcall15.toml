# toolcall15 evaluation for qwen-9b

[meta]
name = "toolcall15-qwen-9b-pod"
description = "toolcall15 on Qwen/Qwen3.5-9B (pod evaluation)"

[defaults]
temperature = 0.0
max_tokens = 16384

[judge]
model = "gpt-5-mini-2025-08-07"
temperature = 0.0
engine = "cloud"

[run]
trace_detail = true
max_workers = 1
output_dir = "/tmp/results/qwen-9b/"
seed = 42

telemetry = true
gpu_metrics = true
[engine.vllm]
host = "http://localhost:8002"

[[models]]
name = "Qwen/Qwen3.5-9B"
engine = "vllm"

param_count_b = 9.0
[[benchmarks]]
name = "toolcall15"
backend = "jarvis-direct"
