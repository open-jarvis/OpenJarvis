# liveresearchbench evaluation for trinity-large

[meta]
name = "liveresearchbench-trinity-large-pod"
description = "liveresearchbench on Trinity-Large (pod evaluation)"

[defaults]
temperature = 0.6
max_tokens = 16384

[judge]
model = "gpt-4.1-mini"
temperature = 0.0
max_tokens = 16384
engine = "cloud"

[run]
trace_detail = true
max_workers = 1
output_dir = "/tmp/results/trinity-large/"
seed = 42

telemetry = true
gpu_metrics = true
[engine.vllm]
host = "http://localhost:8000"

[[models]]
name = "arcee-ai/Trinity-Large-Thinking-FP8-Block"
engine = "vllm"

param_count_b = 398.0
active_params_b = 13.0
[[benchmarks]]
name = "liveresearchbench"
backend = "jarvis-agent"
agent = "monitor_operative"
tools = ["web_search", "file_read", "file_write", "code_interpreter", "think"]
max_turns = 60
