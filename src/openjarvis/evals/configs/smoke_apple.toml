# ---------------------------------------------------------------------------
# Benchmarks — 3 samples each, covering direct + all agent harnesses + tools
# ---------------------------------------------------------------------------

# --- Intelligence (jarvis-direct) ---

[[benchmarks]]
name = "supergpqa"
backend = "jarvis-direct"
max_samples = 3

[[benchmarks]]
name = "simpleqa"
backend = "jarvis-direct"
max_samples = 3

[[benchmarks]]
name = "mmlu-pro"
backend = "jarvis-direct"
max_samples = 3

[[benchmarks]]
name = "math500"
backend = "jarvis-direct"
max_samples = 3

# --- Agent: simple ---

[[benchmarks]]
name = "wildchat"
backend = "jarvis-agent"
agent = "simple"
tools = ["think"]
max_samples = 3

# --- Agent: native_react ---

[[benchmarks]]
name = "gaia"
backend = "jarvis-agent"
agent = "native_react"
tools = ["think", "calculator", "code_interpreter", "web_search", "file_read", "file_write"]
max_samples = 3

# --- Agent: native_openhands ---

[[benchmarks]]
name = "coding_task"
backend = "jarvis-agent"
agent = "native_openhands"
tools = ["think", "code_interpreter", "file_read", "file_write", "shell_exec", "git_status", "git_diff"]
max_samples = 3

