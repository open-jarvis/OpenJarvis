# Use-case v2 — Apple Silicon platform
# Target: LFM2.5, Qwen 2.5, Qwen 3.5 4B — all via Ollama
# Run: uv run python -m openjarvis.evals run -c src/openjarvis/evals/configs/use_case_v2_apple.toml

[meta]
name = "use-case-v2-apple"
description = "5 use-case benchmarks × Ollama models (LFM2.5, Qwen2.5, Qwen3.5 4B) on Apple Silicon"

[defaults]
temperature = 0.0
max_tokens = 4096

[judge]
model = "gpt-5-mini-2025-08-07"

[run]
max_workers = 2
output_dir = "results/use-cases-v2-apple/"
seed = 42

# ── Models (all via Ollama) ───────────────────────────────────────────────────

# LFM2.5 1.2B — Ollama; create with: jarvis host hadad/LFM2.5-1.2B:F16 --backend ollama
[[models]]
name = "hadad/LFM2.5-1.2B:F16"
engine = "ollama"

# ── Benchmarks (5 use-case, 30 samples each) ──────────────────────────────────

[[benchmarks]]
name = "coding_assistant"
backend = "jarvis-direct"
max_samples = 30

[[benchmarks]]
name = "security_scanner"
backend = "jarvis-direct"
max_samples = 30

[[benchmarks]]
name = "daily_digest"
backend = "jarvis-direct"
max_samples = 30

[[benchmarks]]
name = "doc_qa"
backend = "jarvis-direct"
max_samples = 30

[[benchmarks]]
name = "browser_assistant"
backend = "jarvis-direct"
max_samples = 30
